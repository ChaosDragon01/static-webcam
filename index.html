<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Webcam Interface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <h1>Live Feed</h1>
    </header>

    <main class="app-main">
        <div class="video-container">
            <video id="webcam" autoplay playsinline></video>
            <div id="error-message" class="error-panel">Camera access denied or not available.</div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="controls-wrapper">
            <button id="capture-btn" class="action-btn">Capture Photo</button>
            <button id="toggle-btn" class="action-btn">Toggle Camera</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
